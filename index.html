<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>行测计分 · 可调题量</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #eef3f8 0%, #e1e9f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px 12px 32px;
    }

    .calculator-card {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 36px;
      box-shadow: 0 20px 40px -8px rgba(20, 40, 60, 0.18), 0 6px 12px rgba(0,0,0,0.03), inset 0 0 0 1px rgba(255,255,255,0.8);
      padding: 24px 20px 32px;
      border: 1px solid rgba(140, 180, 210, 0.2);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 550;
      font-size: 1.9rem;
      color: #1e3b5c;
      margin-bottom: 6px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(80, 130, 180, 0.2);
    }

    h1 i {
      color: #2c6289;
      font-size: 1.8rem;
      background: #d6e6f5;
      padding: 10px;
      border-radius: 18px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .subtitle {
      color: #3f607d;
      margin-bottom: 20px;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .score-summary {
      background: #1e3b5c;
      border-radius: 32px;
      padding: 20px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px 8px;
      box-shadow: 0 14px 18px -6px rgba(20, 50, 70, 0.25);
      color: white;
    }

    .total-box {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .total-label { font-size: 1.1rem; opacity: 0.9; }
    .total-score { font-size: 3.8rem; font-weight: 650; line-height: 1; }
    .total-outof { font-size: 1.3rem; opacity: 0.8; margin-left: 4px; }

    .stats-right { text-align: right; }
    .correct-count { font-size: 1.5rem; font-weight: 550; }
    .progress-badge {
      background: rgba(255,255,240,0.18);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 1rem;
      backdrop-filter: blur(4px);
      display: inline-block;
      margin-top: 4px;
    }

    /* 模块卡片 */
    .module-row {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 18px 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(160,190,215,0.3);
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      position: relative;
    }

    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .module-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #1e3b5c;
      font-size: 1.2rem;
    }

    .module-title i { color: #3a7099; width: 1.8rem; font-size: 1.3rem; }

    /* 总题数可编辑区域 */
    .total-edit {
      display: flex;
      align-items: center;
      background: #e2ecf5;
      border-radius: 40px;
      padding: 2px 6px 2px 14px;
      border: 1px solid #b8cee2;
    }
    .total-edit input {
      width: 65px;
      padding: 8px 4px;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 550;
      text-align: center;
      color: #1e3b5c;
      outline: none;
    }
    .total-edit input:focus {
      background: rgba(255,255,255,0.5);
      border-radius: 30px;
    }
    .total-edit .unit {
      padding-right: 10px;
      color: #3a5f7a;
      font-size: 0.9rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #9b7a6b;
      font-size: 1.3rem;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 30px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { background: rgba(200,100,80,0.1); color: #b15e4a; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 48px;
      border: 1.5px solid #cddde9;
      padding: 4px 6px 4px 18px;
      flex: 1;
    }
    .input-group:focus-within { border-color: #2c7eb6; box-shadow: 0 0 0 3px rgba(44,126,182,0.15); }
    .input-group label { font-size: 0.9rem; color: #4d6f8c; white-space: nowrap; }
    .input-group input {
      width: 100%;
      padding: 12px 6px 12px 2px;
      border: none;
      background: transparent;
      font-size: 1.1rem;
      font-weight: 550;
      text-align: right;
      color: #103247;
      outline: none;
    }
    .input-group .unit { padding-right: 14px; font-size: 0.9rem; color: #6d8da8; }

    .module-score-box {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
    }
    .score-label { font-size: 0.9rem; color: #52718b; margin-right: 6px; }
    .score-cell { font-weight: 700; font-size: 1.7rem; color: #1e4d6b; }
    .score-unit { font-size: 0.9rem; margin-left: 3px; color: #65809b; }

    /* 添加模块面板 */
    .add-section { margin: 18px 0 8px; }
    .add-toggle-btn {
      background: rgba(220, 235, 250, 0.8);
      border: 1px dashed #7f9fbb;
      border-radius: 60px;
      padding: 14px 18px;
      width: 100%;
      font-size: 1.1rem;
      color: #1e3b5c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .add-toggle-btn:active { background: #c8daea; }

    .add-form-panel {
      margin-top: 16px;
      background: rgba(235, 245, 255, 0.7);
      border-radius: 32px;
      padding: 18px 16px;
      backdrop-filter: blur(8px);
      border: 1px solid #bdd2e6;
      display: none;
    }
    .add-form-panel.show { display: block; }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .form-field {
      flex: 1;
      background: white;
      border-radius: 40px;
      padding: 4px 16px;
      border: 1.5px solid #cddde9;
      display: flex;
      align-items: center;
    }
    .form-field input {
      width: 100%;
      padding: 12px 0;
      border: none;
      background: transparent;
      font-size: 1rem;
      outline: none;
    }
    .form-actions {
      display: flex;
      gap: 10px;
    }
    .form-btn {
      flex: 1;
      padding: 14px;
      border-radius: 40px;
      border: none;
      font-weight: 550;
      background: white;
      color: #1e3b5c;
      border: 1px solid #b8cee2;
      cursor: pointer;
    }
    .form-btn.primary {
      background: #1e3b5c;
      color: white;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      border: 1px solid #b6cee2;
      padding: 14px 20px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 540;
      color: #1e3b5c;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex: 1 1 0;
      min-width: 100px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: #d8e5f0; transform: scale(0.98); }
    .btn.primary { background: #1e3b5c; color: white; border: none; }
    .btn.primary i { color: #ffe5a3; }

    .footnote {
      margin-top: 20px;
      text-align: center;
      color: #5d7e99;
      font-size: 0.85rem;
    }

    @media (max-width: 380px) {
      .input-row { flex-wrap: wrap; }
      .module-score-box { width: 100%; justify-content: space-between; background: #eaf1f9; padding: 8px 16px; border-radius: 40px; }
      .total-box { flex-direction: column; align-items: flex-start; }
      .module-header { flex-direction: column; align-items: flex-start; }
      .total-edit { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>
<div class="calculator-card">
  <h1><i class="fas fa-calculator"></i> 行测计分器</h1>
  <div class="subtitle">
    <span><i class="fas fa-pencil-alt"></i> 可调题量·自由增删</span>
    <span><i class="far fa-clock"></i> 实时累计</span>
  </div>

  <!-- 总分卡 -->
  <div class="score-summary">
    <div class="total-box">
      <span class="total-label">总分</span>
      <span class="total-score" id="totalScoreDisplay">0.00</span>
      <span class="total-outof" id="fullScoreDisplay">/ 100.0</span>
    </div>
    <div class="stats-right">
      <div class="correct-count" id="correctStats">0/130</div>
      <div class="progress-badge" id="accuracyDisplay">正确率 0.0%</div>
    </div>
  </div>

  <!-- 模块列表容器 -->
  <div id="modulesContainer"></div>

  <!-- 添加模块区域 -->
  <div class="add-section">
    <button class="add-toggle-btn" id="showAddPanelBtn"><i class="fas fa-plus-circle"></i> 添加自定义模块</button>
    <div class="add-form-panel" id="addFormPanel">
      <div class="form-row">
        <div class="form-field">
          <input type="text" id="newModuleName" placeholder="模块名称" value="自定义">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <input type="number" id="newModuleTotal" placeholder="总题数" value="10" min="1" step="1">
        </div>
        <div class="form-field">
          <input type="number" id="newModuleScore" placeholder="每题分值" value="0.8" min="0" step="0.1">
        </div>
      </div>
      <div class="form-actions">
        <button class="form-btn" id="cancelAddBtn">取消</button>
        <button class="form-btn primary" id="confirmAddBtn"><i class="fas fa-check"></i> 添加</button>
      </div>
    </div>
  </div>

  <!-- 底部操作按钮 -->
  <div class="action-bar">
    <button class="btn" id="resetCorrectBtn"><i class="fas fa-eraser"></i> 清零题数</button>
    <button class="btn" id="resetScoreDefaultsBtn"><i class="fas fa-undo-alt"></i> 重置分值</button>
    <button class="btn primary" id="fullResetBtn"><i class="fas fa-rotate-left"></i> 恢复默认</button>
  </div>
  <div class="footnote">
    <i class="far fa-lightbulb"></i> 点击模块右上角 <i class="fas fa-times"></i> 删除 · 总题数可直接编辑
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 默认模块（可恢复） ----------
    const DEFAULT_MODULES = [
      { id: 'default1', name: '言语理解', total: 40, defaultScore: 0.8, icon: 'fa-book-open' },
      { id: 'default2', name: '数量关系', total: 10, defaultScore: 0.8, icon: 'fa-cubes' },
      { id: 'default3', name: '判断推理', total: 40, defaultScore: 0.7, icon: 'fa-puzzle-piece' },
      { id: 'default4', name: '资料分析', total: 20, defaultScore: 0.8, icon: 'fa-chart-bar' },
      { id: 'default5', name: '常识判断', total: 20, defaultScore: 0.7, icon: 'fa-globe' }
    ];

    // ---------- 全局状态 ----------
    let modulesData = [];
    let nextId = 1000;

    const container = document.getElementById('modulesContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const fullScoreSpan = document.getElementById('fullScoreDisplay');
    const correctStatsSpan = document.getElementById('correctStats');
    const accuracyDisplay = document.getElementById('accuracyDisplay');
    
    const addPanel = document.getElementById('addFormPanel');
    const showAddBtn = document.getElementById('showAddPanelBtn');
    const cancelAddBtn = document.getElementById('cancelAddBtn');
    const confirmAddBtn = document.getElementById('confirmAddBtn');
    const newNameInput = document.getElementById('newModuleName');
    const newTotalInput = document.getElementById('newModuleTotal');
    const newScoreInput = document.getElementById('newModuleScore');

    function getDefaultModules() {
      return DEFAULT_MODULES.map(m => ({ ...m, id: m.id + '-' + Date.now() + Math.random() }));
    }

    function resetToDefaultModules() {
      modulesData = getDefaultModules();
      renderAllModules();
    }

    // ---------- 渲染模块（总题数可编辑） ----------
    function renderAllModules() {
      if (!container) return;
      let html = '';
      modulesData.forEach((mod) => {
        html += `
          <div class="module-row" data-module-id="${mod.id}">
            <div class="module-header">
              <div class="module-title">
                <i class="fas ${mod.icon || 'fa-cube'}"></i> ${mod.name}
              </div>
              <div style="display:flex; align-items:center; gap:8px;">
                <div class="total-edit">
                  <input type="number" class="total-input" data-id="${mod.id}" value="${mod.total}" min="1" step="1" inputmode="numeric">
                  <span class="unit">题</span>
                </div>
                <button class="delete-btn" data-action="delete" data-id="${mod.id}" aria-label="删除模块"><i class="fas fa-times"></i></button>
              </div>
            </div>
            <div class="input-row">
              <div class="input-group">
                <label>✓正确</label>
                <input type="number" class="correct-input" data-id="${mod.id}" value="0" min="0" max="${mod.total}" step="1" inputmode="numeric">
                <span class="unit">题</span>
              </div>
              <div class="input-group">
                <label>✧分值</label>
                <input type="number" class="score-per-input" data-id="${mod.id}" value="${mod.defaultScore.toFixed(1)}" min="0" max="10" step="0.1">
                <span class="unit">分</span>
              </div>
            </div>
            <div class="module-score-box">
              <span class="score-label">模块得分</span>
              <span class="score-cell" data-score-id="${mod.id}">0.00</span>
              <span class="score-unit">分</span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      attachGlobalListeners();
      updateAllScores();
    }

    // 统一事件监听（委托）
    function attachGlobalListeners() {
      // 已经在容器上通过事件委托处理，无需重复绑定
    }

    // 容器委托处理所有输入、删除、总题数变更
    container.addEventListener('input', (e) => {
      const target = e.target;
      const moduleId = target.dataset.id;
      const mod = modulesData.find(m => m.id === moduleId);
      if (!mod) return;

      // 处理总题数输入
      if (target.classList.contains('total-input')) {
        let newTotal = parseInt(target.value, 10);
        if (isNaN(newTotal) || newTotal < 1) newTotal = 1;
        target.value = newTotal;
        mod.total = newTotal;   // 更新数据
        
        // 同步正确数输入框的max属性 (通过update时自动限制)
        const row = target.closest('.module-row');
        const correctInput = row.querySelector('.correct-input');
        if (correctInput) {
          let correct = parseInt(correctInput.value, 10) || 0;
          if (correct > newTotal) correctInput.value = newTotal;
          correctInput.max = newTotal;
        }
        updateAllScores();
        return;
      }

      // 正确数 / 分值输入
      if (target.classList.contains('correct-input') || target.classList.contains('score-per-input')) {
        if (target.classList.contains('correct-input')) {
          let val = parseInt(target.value, 10);
          if (isNaN(val) || val < 0) val = 0;
          if (val > mod.total) val = mod.total;
          target.value = val;
        } else {
          let val = parseFloat(target.value);
          if (isNaN(val) || val < 0) val = 0;
          target.value = val.toFixed(1);
        }
        updateAllScores();
      }
    });

    container.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action="delete"]');
      if (btn && btn.dataset.id) {
        const id = btn.dataset.id;
        deleteModuleById(id);
      }
    });

    function deleteModuleById(id) {
      if (modulesData.length <= 1) {
        alert('至少保留一个模块，无法删除。');
        return;
      }
      modulesData = modulesData.filter(m => m.id !== id);
      renderAllModules();
    }

    // ---------- 更新总分 / 正确率（基于modulesData及DOM）----------
    function updateAllScores() {
      let totalScore = 0, totalCorrect = 0, totalQuestions = 0, fullScoreSum = 0;
      
      const rows = document.querySelectorAll('.module-row');
      rows.forEach(row => {
        const moduleId = row.dataset.moduleId;
        const mod = modulesData.find(m => m.id === moduleId);
        if (!mod) return;
        
        const correctInput = row.querySelector('.correct-input');
        const scoreInput = row.querySelector('.score-per-input');
        const totalInput = row.querySelector('.total-input');
        const scoreCell = row.querySelector('[data-score-id]');
        
        // 确保total同步
        if (totalInput) {
          let totalVal = parseInt(totalInput.value, 10);
          if (isNaN(totalVal) || totalVal < 1) totalVal = 1;
          mod.total = totalVal;
          totalInput.value = totalVal;
        }
        
        const correct = parseInt(correctInput.value, 10) || 0;
        const perScore = parseFloat(scoreInput.value) || 0;
        const validCorrect = Math.min(correct, mod.total);
        if (correct !== validCorrect) correctInput.value = validCorrect;
        
        const moduleScore = validCorrect * perScore;
        if (scoreCell) scoreCell.textContent = moduleScore.toFixed(2);
        
        totalScore += moduleScore;
        totalCorrect += validCorrect;
        totalQuestions += mod.total;
        fullScoreSum += mod.total * perScore;
      });
      
      totalScoreSpan.textContent = totalScore.toFixed(2);
      fullScoreSpan.textContent = `/ ${fullScoreSum.toFixed(1)}`;
      correctStatsSpan.textContent = `${totalCorrect}/${totalQuestions}`;
      const accuracy = totalQuestions > 0 ? (totalCorrect / totalQuestions) * 100 : 0;
      accuracyDisplay.textContent = `正确率 ${accuracy.toFixed(1)}%`;
    }

    // ---------- 按钮操作 ----------
    function resetCorrectOnly() {
      document.querySelectorAll('.correct-input').forEach(input => { input.value = 0; });
      updateAllScores();
    }

    function resetScoreToDefault() {
      modulesData.forEach(mod => {
        const input = document.querySelector(`.score-per-input[data-id="${mod.id}"]`);
        if (input) input.value = mod.defaultScore.toFixed(1);
      });
      updateAllScores();
    }

    function fullResetToDefault() {
      resetToDefaultModules();
    }

    // ---------- 添加自定义模块 ----------
    function addCustomModule() {
      let name = newNameInput.value.trim();
      if (!name) name = '自定义';
      
      let total = parseInt(newTotalInput.value, 10);
      if (isNaN(total) || total < 1) total = 10;
      
      let score = parseFloat(newScoreInput.value);
      if (isNaN(score) || score < 0) score = 0.8;
      
      const newMod = {
        id: `custom-${nextId++}`,
        name: name,
        total: total,
        defaultScore: score,
        icon: 'fa-pen'
      };
      
      modulesData.push(newMod);
      renderAllModules();
      
      newNameInput.value = '自定义';
      newTotalInput.value = '10';
      newScoreInput.value = '0.8';
      addPanel.classList.remove('show');
    }

    // ---------- 绑定全局控件 ----------
    function bindGlobalControls() {
      document.getElementById('resetCorrectBtn').addEventListener('click', resetCorrectOnly);
      document.getElementById('resetScoreDefaultsBtn').addEventListener('click', resetScoreToDefault);
      document.getElementById('fullResetBtn').addEventListener('click', fullResetToDefault);
      
      showAddBtn.addEventListener('click', () => {
        addPanel.classList.toggle('show');
      });
      cancelAddBtn.addEventListener('click', () => {
        addPanel.classList.remove('show');
      });
      confirmAddBtn.addEventListener('click', addCustomModule);
    }

    function init() {
      resetToDefaultModules();
      bindGlobalControls();
    }

    init();

    // 触摸优化
    document.querySelectorAll('.btn, .add-toggle-btn, .form-btn').forEach(btn => {
      btn.addEventListener('touchstart', () => {}, { passive: true });
    });
  })();
</script>
</body>
</html>
```
